[defaults]
# Roles path — searched when ansible-playbook runs from the ansible/ directory.
# Ansible also checks relative to the playbook file; this adds ansible/roles/ explicitly.
roles_path = roles

# Suppress warnings for collections installed without a galaxy namespace
deprecation_warnings = False

# Speed up fact gathering (not needed for ACI - connection is local)
gathering = smart

[ssh_connection]
# Not used (connection: local for ACI), but set as a best practice
pipelining = True
