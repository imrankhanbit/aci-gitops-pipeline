---
# Ansible inventory — ACI fabric targets
# Credentials are never stored here; use environment variables or Ansible Vault.
# See group_vars/aci.yml for connection parameters.

all:
  children:
    aci:
      hosts:
        devnet-sandbox:
          ansible_host: sandboxapicdc.cisco.com
          apic_environment: devnet

        prod-apic:
          ansible_host: "{{ lookup('env', 'APIC_HOST') }}"
          apic_environment: production
