---
# ============================================================
# Playbook: validate_fabric.yml
#
# Read-only validation of ACI fabric health.
# Controllers are excluded from node state checks (expected behaviour —
# controllers report 'in-service' not 'active').
# Run as a post-deploy gate before closing the ServiceNow CR.
#
# Usage:
#   ansible-playbook playbooks/validate_fabric.yml \
#     -i inventory/hosts.yml \
#     -e "target_host=devnet-sandbox"
# ============================================================

- name: Validate ACI Fabric Health
  hosts: "{{ target_host | default('devnet-sandbox') }}"
  gather_facts: false
  connection: local

  tasks:
    - name: Query fabric nodes
      cisco.aci.aci_rest:
        host: "{{ aci_hostname }}"
        username: "{{ aci_username }}"
        password: "{{ aci_password }}"
        validate_certs: "{{ aci_validate_certs }}"
        use_ssl: "{{ aci_use_ssl }}"
        path: /api/node/class/fabricNode.json?order-by=fabricNode.id
        method: get
      register: fabric_nodes

    - name: Display fabric nodes (controllers excluded from active check)
      ansible.builtin.debug:
        msg: >
          Node {{ item.fabricNode.attributes.id }}
          role={{ item.fabricNode.attributes.role }}
          state={{ item.fabricNode.attributes.fabricSt }}
      loop: "{{ fabric_nodes.imdata }}"

    - name: Check leaf/spine nodes are active (controllers skipped)
      ansible.builtin.fail:
        msg: >
          Node {{ item.fabricNode.attributes.id }}
          (role: {{ item.fabricNode.attributes.role }})
          is in state '{{ item.fabricNode.attributes.fabricSt }}' — expected 'active'.
      when:
        - item.fabricNode.attributes.role != 'controller'
        - item.fabricNode.attributes.fabricSt != 'active'
      loop: "{{ fabric_nodes.imdata }}"

    - name: Query critical faults (informational — sandbox has pre-existing faults)
      cisco.aci.aci_rest:
        host: "{{ aci_hostname }}"
        username: "{{ aci_username }}"
        password: "{{ aci_password }}"
        validate_certs: "{{ aci_validate_certs }}"
        use_ssl: "{{ aci_use_ssl }}"
        path: /api/node/class/faultSummary.json?query-target-filter=and(eq(faultSummary.severity,"critical"))
        method: get
      register: critical_faults

    - name: Report critical fault count (not a pipeline gate on shared sandbox)
      ansible.builtin.debug:
        msg: >
          Critical faults: {{ critical_faults.imdata | length }}
          (pre-existing sandbox faults are informational only)

    - name: Fabric validation complete
      ansible.builtin.debug:
        msg: "Fabric health check passed. Leaf/spine nodes active, fabric ready."
